appId: com.sachitgoyal.liftai
---
# Machine notes: add exercise, toggle notes, type, verify persistence

- runFlow: ../workout/start-empty.yaml

# Search and select Bench Press
- tapOn:
    id: "exercise-search"
- inputText: "Bench"
- hideKeyboard
- tapOn:
    id: "exercise-item-Bench-Press"

# Wait for exercise block to appear
- waitForAnimationToEnd

# Tap Machine button to show notes field
- tapOn:
    text: "Machine"

# Verify notes field appears
- assertVisible:
    id: "machine-notes-0"

# Type machine notes
- tapOn:
    id: "machine-notes-0"
- inputText: "Seat position 3"
- hideKeyboard

# Tap Hide Settings to collapse
- tapOn:
    text: "Hide Settings"

# Verify notes field is hidden
- assertNotVisible:
    id: "machine-notes-0"

# Tap Machine again to verify persistence
- tapOn:
    text: "Machine"
- assertVisible:
    id: "machine-notes-0"
